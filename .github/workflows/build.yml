name: Build Buddy

# Builds a real installer for each platform on every push of a version
# tag (v1.0.0, v1.2.3, etc.), and uploads them as a draft GitHub Release.
# Can also be triggered manually from the Actions tab (workflow_dispatch)
# to test a build without cutting a release.
#
# Why this exists: PyInstaller doesn't cross-compile -- a Windows
# installer has to be built BY RUNNING on Windows, a macOS .dmg BY
# RUNNING on macOS. This workflow uses GitHub's free Windows/macOS/Linux
# runners to do exactly that, so you get all three without owning three
# computers.
#
# Output per platform:
#   Windows -> Buddy-Setup.exe   (Inno Setup wizard: Start Menu, uninstaller)
#   macOS   -> Buddy.dmg         (drag-to-Applications)
#   Linux   -> Buddy-amd64.deb   (apt/dpkg install, shows up in app menus)
#           -> Buddy.AppImage    (no install needed, runs anywhere)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Strips the leading "v" from a tag like v0.1.0 -> 0.1.0, for use
      # in filenames/version fields. Falls back to 0.0.0 on a manual
      # workflow_dispatch run, where there's no tag.
      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      # Linux only: install libxcb-cursor0 BEFORE building, so PyInstaller
      # bundles it into the output -- without this, the built binary would
      # need end users to separately `apt install libxcb-cursor0` themselves.
      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libxcb-cursor0 dpkg-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller buddy.spec --noconfirm

      # -- Windows: Inno Setup wizard --
      - name: Build Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DVersion=${{ steps.version.outputs.version }}" `
            packaging\windows\installer.iss
          New-Item -ItemType Directory -Force -Path release_output | Out-Null
          Move-Item dist_installer\Buddy-Setup.exe release_output\Buddy-Setup.exe

      # -- macOS: .dmg --
      - name: Build macOS .dmg
        if: matrix.platform == 'macos'
        run: |
          mkdir -p release_output
          hdiutil create -volname Buddy -srcfolder dist/Buddy.app \
            -ov -format UDZO release_output/Buddy.dmg

      # -- Linux: .deb + AppImage --
      - name: Build Linux packages
        if: matrix.platform == 'linux'
        run: |
          chmod +x packaging/linux/build.sh
          bash packaging/linux/build.sh "${{ steps.version.outputs.version }}"
          mkdir -p release_output
          mv Buddy-*-amd64.deb release_output/
          mv Buddy-*-x86_64.AppImage release_output/

      - uses: actions/upload-artifact@v4
        with:
          name: Buddy-${{ matrix.platform }}
          path: release_output/*
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
